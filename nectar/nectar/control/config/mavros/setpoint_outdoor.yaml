# Outdoor setpoint navigation parameters
# ArduPilot GUIDED mode speed/radius limits
# All values in SI units (m/s, m)
#
# guid_options: GUID_OPTIONS bitmask
#   bit 0 (1): Allow arming from TX
#   bit 6 (64): WPNav S-curve for position targets
#   bit 7 (128): Weathervaning
#   65 = arm from TX + WPNav
guid_options: 65
speed: 2.0
speed_up: 1.5
speed_down: 1.0
accel: 1.0
radius: 0.3
