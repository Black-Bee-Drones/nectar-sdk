# Simulation outdoor setpoint parameters
# Higher speed/accel/jerk for SITL — simulated physics need aggressive
# controller tuning for responsive horizontal movement.
# ArduPilot defaults: WPNAV_SPEED=1000cm/s, WPNAV_ACCEL=250cm/s/s, PSC_JERK_NE=5.0
guid_options: 1
speed: 5.0
speed_up: 2.5
speed_down: 1.5
accel: 3.0
radius: 0.2
jerk: 10.0
psc_jerk: 20.0
rfnd_use: 1
