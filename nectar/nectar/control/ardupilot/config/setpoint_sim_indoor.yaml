# Simulation indoor setpoint parameters
# Higher speed/accel/jerk for SITL — simulated physics need aggressive
# controller tuning for responsive horizontal movement.
# ArduPilot defaults: WPNAV_SPEED=1000cm/s, WPNAV_ACCEL=250cm/s/s, PSC_JERK_XY=5.0
guid_options: 0
speed: 1.2
speed_up: 2.3
speed_down: 1.5
accel: 1.5
radius: 0.2
jerk: 2.0
psc_jerk: 2.5
rfnd_use: 1
