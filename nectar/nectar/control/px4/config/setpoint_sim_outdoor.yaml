# Outdoor SITL setpoint navigation parameters (PX4 x500 in Gazebo)
# Mirrors setpoint_outdoor.yaml; slightly lower cruise for stable sim tracking.
# Maps to MPC_* parameters; all values SI except yaw_rate (deg/s).

speed: 4.0        # MPC_XY_CRUISE
vel_max: 12.0     # MPC_XY_VEL_MAX
speed_up: 3.0     # MPC_Z_VEL_MAX_UP
speed_down: 1.5   # MPC_Z_VEL_MAX_DN

accel: 3.0        # MPC_ACC_HOR
accel_up: 4.0     # MPC_ACC_UP_MAX
accel_down: 3.0   # MPC_ACC_DOWN_MAX

jerk: 8.0         # MPC_JERK_AUTO
yaw_rate: 45.0    # MPC_YAWRAUTO_MAX

takeoff_speed: 1.5  # MPC_TKO_SPEED
