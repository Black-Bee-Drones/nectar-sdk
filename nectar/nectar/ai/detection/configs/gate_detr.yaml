# Gate Detection - DETR ResNet-50 (quick local test)
# Dataset: Roboflow black-bee-drones/imav-25-gate-sfbbq (auto-converted to COCO)
# Usage: nectar-ai detect train --config <path-to-this-file>

data:
  dataset_path: nectar/ai/data/imav-gate
  dataset_format: yolo

train:
  framework: transformers
  model: facebook/detr-resnet-50
  epochs: 2
  batch_size: 2
  learning_rate: 1e-5
  output_dir: nectar/ai/outputs/gate-detr
  max_train_samples: 100
  max_eval_samples: 50
  device: cuda
  seed: 42
  tensorboard: true
  start_tensorboard: false
  gradient_accumulation_steps: 4
  imgsz: 320
  mixed_precision: fp16
  weight_decay: 0.0001
  warmup_ratio: 0.1
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  early_stopping_patience: 0
  push_to_hub: true
  hub_model_id: blackbeedrones/gate-detr

eval:
  evaluate: true
  eval_split: test
  conf_threshold: 0.25
  iou_threshold: 0.5
  batch_size: 1
  device: cuda
