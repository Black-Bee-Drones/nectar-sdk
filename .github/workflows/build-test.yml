name: Build and Test

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

jobs:
  build_and_verify:
    name: ${{ matrix.ros_distro }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble, jazzy, kilted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SDK image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            ROS_DISTRO=${{ matrix.ros_distro }}
            INSTALL_REALSENSE=true
          target: sdk
          load: true
          tags: mirela-sdk:${{ matrix.ros_distro }}-test
          cache-from: type=gha,scope=${{ matrix.ros_distro }}-sdk
          cache-to: type=gha,mode=max,scope=${{ matrix.ros_distro }}-sdk

      - name: Verify SDK
        run: |
          docker run --rm mirela-sdk:${{ matrix.ros_distro }}-test bash -c "
            source /opt/ros/\$ROS_DISTRO/setup.bash
            source /home/ros2_ws/install/local_setup.bash 2>/dev/null
            /home/ros2_ws/src/mirela-sdk/scripts/setup.sh verify
          "

      - name: Verify RealSense
        run: |
          docker run --rm mirela-sdk:${{ matrix.ros_distro }}-test bash -c "
            source /opt/ros/\$ROS_DISTRO/setup.bash
            source /home/ros2_ws/install/local_setup.bash 2>/dev/null
            /home/ros2_ws/src/mirela-sdk/scripts/setup.sh realsense-verify
          "
