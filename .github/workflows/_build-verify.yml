name: Build and Verify

on:
  workflow_call:
    inputs:
      ros_distro:
        required: true
        type: string
      install_realsense:
        required: false
        type: string
        default: "true"
    outputs:
      image_tag:
        description: "Local Docker image tag that was built and verified"
        value: ${{ jobs.build_and_verify.outputs.image_tag }}

jobs:
  build_and_verify:
    name: Build & Verify (${{ inputs.ros_distro }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=mirela-sdk:${{ inputs.ros_distro }}-ci" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SDK image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            ROS_DISTRO=${{ inputs.ros_distro }}
            INSTALL_REALSENSE=${{ inputs.install_realsense }}
          target: sdk
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ inputs.ros_distro }}-sdk
          cache-to: type=gha,mode=max,scope=${{ inputs.ros_distro }}-sdk

      - name: Verify SDK
        run: |
          docker run --rm ${{ steps.meta.outputs.tag }} bash -c "
            source /opt/ros/\$ROS_DISTRO/setup.bash
            source /home/ros2_ws/install/local_setup.bash 2>/dev/null
            /home/ros2_ws/src/mirela-sdk/scripts/setup.sh verify
          "

      - name: Verify RealSense
        if: inputs.install_realsense == 'true'
        run: |
          docker run --rm ${{ steps.meta.outputs.tag }} bash -c "
            source /opt/ros/\$ROS_DISTRO/setup.bash
            source /home/ros2_ws/install/local_setup.bash 2>/dev/null
            /home/ros2_ws/src/mirela-sdk/scripts/setup.sh realsense-verify
          "
