name: Docker Push

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to apply"
        required: true
      distros:
        description: "Space-separated: humble jazzy kilted"
        default: "humble jazzy kilted"

jobs:
  humble:
    if: >-
      github.event_name == 'release' ||
      contains(github.event.inputs.distros, 'humble')
    uses: ./.github/workflows/_docker-push-distro.yml
    secrets: inherit
    with:
      ros_distro: humble
      release_tag: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
      install_drone: all

  jazzy:
    if: >-
      github.event_name == 'release' ||
      contains(github.event.inputs.distros, 'jazzy')
    uses: ./.github/workflows/_docker-push-distro.yml
    secrets: inherit
    with:
      ros_distro: jazzy
      release_tag: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
      install_drone: all

  kilted:
    if: >-
      github.event_name == 'release' ||
      contains(github.event.inputs.distros, 'kilted')
    uses: ./.github/workflows/_docker-push-distro.yml
    secrets: inherit
    with:
      ros_distro: kilted
      release_tag: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
      install_drone: all
